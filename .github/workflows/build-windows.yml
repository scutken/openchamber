name: Build Windows

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get bun version
        id: bun-version
        shell: bash
        run: echo "version=$(bun --version)" >> "$GITHUB_OUTPUT"

      - name: Cache bun global
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ steps.bun-version.outputs.version }}-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            bun-${{ steps.bun-version.outputs.version }}-${{ runner.os }}-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Cache electron binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: electron-${{ runner.os }}-${{ hashFiles('packages/electron/package.json') }}
          restore-keys: |
            electron-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Electron app (Windows)
        working-directory: packages/electron
        run: |
          bun run build:web-assets
          bun run bundle:main
          bun run rebuild:native
          .\node_modules\.bin\electron-builder --win --publish=never

      - name: List artifacts
        shell: bash
        run: |
          echo "=== Built artifacts ==="
          ls -lh packages/electron/dist/*.exe 2>/dev/null || echo "No .exe found"
          ls -lh packages/electron/dist/*.blockmap 2>/dev/null || true

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            packages/electron/dist/*.exe
            packages/electron/dist/*.blockmap
          retention-days: 7
