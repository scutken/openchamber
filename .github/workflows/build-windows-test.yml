name: Build Windows (Test)

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Electron app (Windows)
        working-directory: packages/electron
        run: |
          bun run build:web-assets
          bun run bundle:main
          bun run rebuild:native
          .\node_modules\.bin\electron-builder --win --publish=never

      - name: List artifacts
        shell: bash
        run: |
          echo "=== Built artifacts ==="
          ls -lh packages/electron/dist/*.exe 2>/dev/null || echo "No .exe found"
          ls -lh packages/electron/dist/*.blockmap 2>/dev/null || true
          echo "=== Full dist directory ==="
          ls -lh packages/electron/dist/ 2>/dev/null || echo "dist dir not found"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            packages/electron/dist/*.exe
            packages/electron/dist/*.blockmap
          retention-days: 3
